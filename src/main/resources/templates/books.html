<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" xmlns:th="http://www.thymeleaf.org" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
          xsi:schemaLocation="http://www.thymeleaf.org"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Spring 6 Webapp</title>
  </head>
  <body>
    <div class="container">
      <h1>Book List</h1>

      <table class="table table-dark table-hover">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Title</th>
          <th scope="col">Publisher</th>
        </tr>

        <tr th:each="book : ${books}">
          <th scope="row" th:text="${book.id}"></th>
          <th th:text="${book.title}"></th>
          <th th:text="${book.publisher.name}"></th>
        </tr>
      </table>
    </div>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
  </body>
</html>
